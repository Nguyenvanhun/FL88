<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Continue</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: #ffffff;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
    }

    h2 {
      margin: 0 0 10px;
      color: #1565c0;
    }

    p {
      color: #666;
      line-height: 1.6;
      font-size: 15px;
    }

    .button {
      display: block;
      margin-top: 22px;
      padding: 15px;
      border-radius: 10px;
      background: #1565c0;
      color: #fff;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
    }

    .button:hover {
      background: #0d47a1;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Continue to Website</h2>
    <p>Please click the button below to open the destination page.</p>

    <a class="button" href="https://ycndif.top/4e775">
      Open Website
    </a>
  </div>

</body>
</html>
